version: 2

updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      microsoft-agents:
        patterns:
          - "Microsoft.Agents.*"
      azure-functions:
        patterns:
          - "Microsoft.Azure.Functions.*"
          - "Microsoft.Azure.Core.Extensions"
      azure-sdk:
        patterns:
          - "Azure.*"
      testing:
        patterns:
          - "xunit*"
          - "Microsoft.NET.Test.*"
          - "coverlet.*"
          - "Moq"
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
