extensions:
  - addsTo:
      pack: codeql/csharp-all
      extensible: summaryModel
    data:
      # Model LogSanitizer.Sanitize as a summary that does NOT propagate taint.
      # By providing a summary with "value" (not "taint") kind, CodeQL treats the
      # output as sanitized — control characters are stripped.
      - ["TeamsNotificationBot.Helpers", "LogSanitizer", False, "Sanitize", "(System.String)", "", "Argument[0]", "ReturnValue", "value", "manual"]
