name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4 2025-10-23
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-artifacts:
    name: Build Release Artifacts
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      VERSION: ${{ needs.release-please.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6 2026-01-09
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5 2026-02-26
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Publish function app
        run: |
          dotnet publish src/TeamsNotificationBot \
            -c Release -r linux-x64 -o ./publish \
            -p:Version=$VERSION

      - name: Create release artifacts
        run: |
          cd publish && zip -r ../teams-notifier-function-app-v${VERSION}.zip . && cd ..
          cp src/TeamsNotificationBot/app-requirements.json ./app-requirements.json
          tar czf teams-app-package-v${VERSION}.tar.gz -C teams-app-package .

      - name: Attest function app ZIP
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2 2025-06-11
        with:
          subject-path: teams-notifier-function-app-v${{ env.VERSION }}.zip

      - name: Attest app-requirements.json
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2 2025-06-11
        with:
          subject-path: app-requirements.json

      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            "teams-notifier-function-app-v${VERSION}.zip" \
            "app-requirements.json" \
            "teams-app-package-v${VERSION}.tar.gz" \
            --clobber
