name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-artifacts:
    name: Build Release Artifacts
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.release-please.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Publish function app
        run: |
          dotnet publish src/TeamsNotificationBot \
            -c Release -r linux-x64 -o ./publish \
            -p:Version=$VERSION

      - name: Create release artifacts
        run: |
          cd publish && zip -r ../teams-notifier-function-app-v${VERSION}.zip . && cd ..
          cp src/TeamsNotificationBot/app-requirements.json ./app-requirements.json
          tar czf teams-app-package-v${VERSION}.tar.gz -C teams-app-package .

      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            "teams-notifier-function-app-v${VERSION}.zip" \
            "app-requirements.json" \
            "teams-app-package-v${VERSION}.tar.gz" \
            --clobber
