name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6 2026-01-09

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5 2026-02-26
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Get npm global directory
        id: npm-global
        run: echo "dir=$(npm prefix -g)" >> "$GITHUB_OUTPUT"

      - name: Cache Azurite global install
        id: cache-azurite
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5 2026-01-29
        with:
          path: |
            ${{ steps.npm-global.outputs.dir }}/lib/node_modules/azurite
            ${{ steps.npm-global.outputs.dir }}/bin/azurite*
          key: azurite-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}

      - name: Install Azurite
        if: steps.cache-azurite.outputs.cache-hit != 'true'
        run: npm install -g azurite

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release -warnAsMessage:xUnit1051

      - name: Test
        run: dotnet test --no-build -c Release --logger GitHubActions

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6 2026-01-09

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4 2026-03-03
        with:
          license-check: false

  validate:
    name: Validate Requirements
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6 2026-01-09

      - name: Regenerate app-requirements.json
        run: bash scripts/generate-requirements.sh

      - name: Check for uncommitted changes
        id: diff-check
        run: |
          if ! git diff --exit-code src/TeamsNotificationBot/app-requirements.json; then
            echo "stale=true" >> "$GITHUB_OUTPUT"
            git diff src/TeamsNotificationBot/app-requirements.json > /tmp/requirements-diff.txt
            echo "::error::app-requirements.json is stale — see PR comment for details."
          else
            echo "stale=false" >> "$GITHUB_OUTPUT"
            echo "app-requirements.json is up to date."
          fi

      - name: Prepare PR comment if stale
        if: steps.diff-check.outputs.stale == 'true' && github.event_name == 'pull_request'
        run: |
          {
            echo '### :x: `app-requirements.json` is out of date'
            echo ''
            echo 'The committed file does not match what `generate-requirements.sh` produces from the current source code. This usually means you changed a queue name, route, auth role, command, or app version but forgot to regenerate.'
            echo ''
            echo '**To fix:**'
            echo '```bash'
            echo 'cd scripts'
            echo 'bash generate-requirements.sh'
            echo '```'
            echo 'Then commit the updated `src/TeamsNotificationBot/app-requirements.json`.'
            echo ''
            echo '<details>'
            echo '<summary>Diff (click to expand)</summary>'
            echo ''
            echo '```diff'
            cat /tmp/requirements-diff.txt
            echo '```'
            echo '</details>'
          } > /tmp/requirements-comment.md

      - name: Post PR comment if stale
        if: steps.diff-check.outputs.stale == 'true' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MARKER="<!-- requirements-check -->"
          PR=${{ github.event.pull_request.number }}
          BODY="$(printf '%s\n%s' "$MARKER" "$(cat /tmp/requirements-comment.md)")"
          COMMENT_ID=$(gh api "repos/$GITHUB_REPOSITORY/issues/$PR/comments" \
            --paginate --jq ".[] | select(.body | startswith(\"$MARKER\")) | .id" | head -1)
          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/$GITHUB_REPOSITORY/issues/comments/$COMMENT_ID" -X PATCH -f body="$BODY"
          else
            gh api "repos/$GITHUB_REPOSITORY/issues/$PR/comments" -f body="$BODY"
          fi

      - name: Remove stale comment if passing
        if: steps.diff-check.outputs.stale == 'false' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MARKER="<!-- requirements-check -->"
          PR=${{ github.event.pull_request.number }}
          COMMENT_ID=$(gh api "repos/$GITHUB_REPOSITORY/issues/$PR/comments" \
            --paginate --jq ".[] | select(.body | startswith(\"$MARKER\")) | .id" | head -1)
          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/$GITHUB_REPOSITORY/issues/comments/$COMMENT_ID" -X DELETE
          fi

      - name: Fail if stale
        if: steps.diff-check.outputs.stale == 'true'
        run: exit 1

      - name: Validate app-requirements.json
        run: bash scripts/validate-requirements.sh

  # Single required status check for branch protection.
  # This replaces requiring each job individually, which breaks when jobs
  # use 'if:' conditions (e.g. dependency-review is PR-only and would
  # show as pending/skipped on push-to-main).
  conclusion:
    if: always()
    name: CI Conclusion
    needs: [build-and-test, dependency-review, validate]
    runs-on: ubuntu-latest
    steps:
      - run: exit 1
        if: >-
          ${{
               contains(needs.*.result, 'failure')
            || contains(needs.*.result, 'cancelled')
          }}
