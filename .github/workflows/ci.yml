name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  security-events: write
  pull-requests: write

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Get npm global directory
        id: npm-global
        run: echo "dir=$(npm prefix -g)" >> "$GITHUB_OUTPUT"

      - name: Cache Azurite global install
        id: cache-azurite
        uses: actions/cache@v5
        with:
          path: |
            ${{ steps.npm-global.outputs.dir }}/lib/node_modules/azurite
            ${{ steps.npm-global.outputs.dir }}/bin/azurite*
          key: azurite-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}

      - name: Install Azurite
        if: steps.cache-azurite.outputs.cache-hit != 'true'
        run: npm install -g azurite

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release -warnAsMessage:xUnit1051

      - name: Test
        run: dotnet test --no-build -c Release --logger "trx;LogFileName=test-results.trx"

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: "**/test-results.trx"
          comment_title: "Test Results"
          check_name: "Test Results"

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp

      - name: Build
        run: dotnet build -c Release -warnAsMessage:xUnit1051

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          license-check: false

  validate:
    name: Validate Requirements
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Regenerate app-requirements.json
        run: bash scripts/generate-requirements.sh

      - name: Check for uncommitted changes
        id: diff-check
        run: |
          if ! git diff --exit-code src/TeamsNotificationBot/app-requirements.json; then
            echo "stale=true" >> "$GITHUB_OUTPUT"
            git diff src/TeamsNotificationBot/app-requirements.json > /tmp/requirements-diff.txt
            echo "::error::app-requirements.json is stale — see PR comment for details."
          else
            echo "stale=false" >> "$GITHUB_OUTPUT"
            echo "app-requirements.json is up to date."
          fi

      - name: Prepare PR comment if stale
        if: steps.diff-check.outputs.stale == 'true' && github.event_name == 'pull_request'
        run: |
          {
            echo '### :x: `app-requirements.json` is out of date'
            echo ''
            echo 'The committed file does not match what `generate-requirements.sh` produces from the current source code. This usually means you changed a queue name, route, auth role, command, or app version but forgot to regenerate.'
            echo ''
            echo '**To fix:**'
            echo '```bash'
            echo 'cd scripts'
            echo 'bash generate-requirements.sh'
            echo '```'
            echo 'Then commit the updated `src/TeamsNotificationBot/app-requirements.json`.'
            echo ''
            echo '<details>'
            echo '<summary>Diff (click to expand)</summary>'
            echo ''
            echo '```diff'
            cat /tmp/requirements-diff.txt
            echo '```'
            echo '</details>'
          } > /tmp/requirements-comment.md

      - name: Post PR comment if stale
        if: steps.diff-check.outputs.stale == 'true' && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: requirements-check
          path: /tmp/requirements-comment.md

      - name: Remove stale comment if passing
        if: steps.diff-check.outputs.stale == 'false' && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: requirements-check
          delete: true

      - name: Fail if stale
        if: steps.diff-check.outputs.stale == 'true'
        run: exit 1

      - name: Validate app-requirements.json
        run: bash scripts/validate-requirements.sh
