name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  security-events: write

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Get npm global directory
        id: npm-global
        run: echo "dir=$(npm prefix -g)" >> "$GITHUB_OUTPUT"

      - name: Cache Azurite global install
        id: cache-azurite
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.npm-global.outputs.dir }}/lib/node_modules/azurite
            ${{ steps.npm-global.outputs.dir }}/bin/azurite*
          key: azurite-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}

      - name: Install Azurite
        if: steps.cache-azurite.outputs.cache-hit != 'true'
        run: npm install -g azurite

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --logger "trx;LogFileName=test-results.trx"

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: "**/test-results.trx"
          reporter: dotnet-trx

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4

  validate:
    name: Validate Requirements
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate app-requirements.json
        run: bash scripts/validate-requirements.sh
