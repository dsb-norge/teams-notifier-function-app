name: Microsoft Security DevOps

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write
  id-token: write

jobs:
  msdo-source:
    name: Source & Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Build (generates .deps.json for Trivy)
        run: dotnet build -c Release --nologo -v quiet -warnAsMessage:xUnit1051

      - name: Run MSDO (Trivy)
        id: msdo
        uses: microsoft/security-devops-action@v1
        with:
          tools: trivy

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: ${{ steps.msdo.outputs.sarifFile }}
          category: msdo-trivy

  msdo-binaries:
    name: Binary Scan (BinSkim)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Publish (R2R, linux-x64)
        run: dotnet publish src/TeamsNotificationBot -c Release -r linux-x64 -o ./publish

      - name: Run MSDO (BinSkim)
        id: msdo
        uses: microsoft/security-devops-action@v1
        with:
          tools: binskim
        env:
          BINSKIM_TARGETS: ./publish/*.dll

      - name: Merge SARIF runs
        if: always()
        run: |
          # BinSkim produces multiple SARIF runs (one per DLL). CodeQL upload-sarif@v4
          # rejects files with multiple runs sharing the same category. Merge all runs
          # into a single run by concatenating their results arrays, while preserving
          # all other run-level metadata from the first run.
          jq '
            . as $root
            | (
                $root.runs[0]
                | .results = [ $root.runs[].results // [] | .[] ]
              ) as $mergedRun
            | $root
            | .runs = [ $mergedRun ]
          ' "${{ steps.msdo.outputs.sarifFile }}" > /tmp/merged-binskim.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: /tmp/merged-binskim.sarif
          category: msdo-binskim
